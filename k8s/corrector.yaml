---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corrector
  namespace: ccp
  labels:
    app: corrector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corrector
  template:
    metadata:
      labels:
        app: corrector
    spec:
      containers:
        - name: corrector
          image: ccp/corrector:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8092
          env:
            - name: MONGODB_URL
              value: "mongodb://mongodb-0.mongodb-headless.data.svc.cluster.local:27017/ccp?replicaSet=rs0&directConnection=true"
            - name: NATS_URL
              value: "nats://nats.messaging.svc.cluster.local:4222"
            - name: INVENTARIO_URL
              value: "http://modulo-inventarios.ccp.svc.cluster.local:8090"
            - name: INV_STANDBY_URL
              value: "http://inv-standby.ccp.svc.cluster.local:8095"
            - name: NODE_ID
              value: "corrector-0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: corrector
  namespace: ccp
spec:
  type: NodePort
  selector:
    app: corrector
  ports:
    - name: http
      port: 8092
      targetPort: 8092
      nodePort: 30092
