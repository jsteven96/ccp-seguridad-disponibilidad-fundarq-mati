---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-auditoria
  namespace: ccp
  labels:
    app: log-auditoria
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-auditoria
  template:
    metadata:
      labels:
        app: log-auditoria
    spec:
      containers:
        - name: log-auditoria
          image: ccp/log-auditoria:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8096
          env:
            - name: MONGODB_URL
              value: "mongodb://mongodb.data.svc.cluster.local:27017/ccp"
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: log-auditoria
  namespace: ccp
spec:
  type: NodePort
  selector:
    app: log-auditoria
  ports:
    - name: http
      port: 8096
      targetPort: 8096
      nodePort: 30096
