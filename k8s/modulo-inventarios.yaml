---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modulo-inventarios
  namespace: ccp
  labels:
    app: modulo-inventarios
    role: primary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modulo-inventarios
      role: primary
  template:
    metadata:
      labels:
        app: modulo-inventarios
        role: primary
    spec:
      nodeSelector:
        role: primary
      containers:
        - name: modulo-inventarios
          image: ccp/modulo-inventarios:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          env:
            - name: MONGODB_URL
              value: "mongodb://mongodb-0.mongodb-headless.data.svc.cluster.local:27017/ccp?replicaSet=rs0&directConnection=true"
            - name: NATS_URL
              value: "nats://nats.messaging.svc.cluster.local:4222"
            - name: HEARTBEAT_INTERVAL_S
              value: "5"
            - name: STANDBY_MODE
              value: "false"
            - name: NODE_ID
              value: "inv-primary"
            - name: SERVICE_NAME
              value: "modulo-inventarios"
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: modulo-inventarios
  namespace: ccp
  labels:
    app: modulo-inventarios
spec:
  type: NodePort
  selector:
    app: modulo-inventarios
    role: primary
  ports:
    - name: http
      port: 8090
      targetPort: 8090
      nodePort: 30090
