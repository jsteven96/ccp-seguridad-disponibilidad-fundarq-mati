---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
  namespace: ccp
  labels:
    app: monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitor
  template:
    metadata:
      labels:
        app: monitor
    spec:
      containers:
        - name: monitor
          image: ccp/monitor:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8091
          env:
            - name: NATS_URL
              value: "nats://nats.messaging.svc.cluster.local:4222"
            - name: CORRECTOR_URL
              value: "http://corrector.ccp.svc.cluster.local:8092"
            - name: NODE_ID
              value: "monitor-0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: monitor
  namespace: ccp
spec:
  type: NodePort
  selector:
    app: monitor
  ports:
    - name: http
      port: 8091
      targetPort: 8091
      nodePort: 30091
