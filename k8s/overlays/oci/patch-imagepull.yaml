# k8s/overlays/oci/patch-imagepull.yaml
# Agrega imagePullSecrets y cambia imagePullPolicy a Always en todos los Deployments
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modulo-inventarios
  namespace: ccp
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: modulo-inventarios
          imagePullPolicy: Always
---
