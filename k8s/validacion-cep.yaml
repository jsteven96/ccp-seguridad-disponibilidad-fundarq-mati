---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: validacion-cep
  namespace: ccp
  labels:
    app: validacion-cep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: validacion-cep
  template:
    metadata:
      labels:
        app: validacion-cep
    spec:
      containers:
        - name: validacion-cep
          image: ccp/validacion-cep:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8094
          env:
            - name: NATS_URL
              value: "nats://nats.messaging.svc.cluster.local:4222"
            - name: MODULO_SEGURIDAD_URL
              value: "http://modulo-seguridad.ccp.svc.cluster.local:8093"
            - name: WINDOW_SECONDS
              value: "60"
            - name: SIGNAL_THRESHOLD
              value: "2"
            - name: RATE_THRESHOLD
              value: "10"
            - name: SKU_CONCENTRATION_THRESHOLD
              value: "0.8"
            - name: CANCEL_RATE_THRESHOLD
              value: "0.5"
          readinessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: validacion-cep
  namespace: ccp
spec:
  type: NodePort
  selector:
    app: validacion-cep
  ports:
    - name: http
      port: 8094
      targetPort: 8094
      nodePort: 30094
